content: |
  # Better Dogs
  ## Philosophy Fit
  This mod strictly adheres to the Vanilla Outsider philosophy by enhancing the vanilla Wolf with deeper systems and reliability. It removes AI "jank" (lava/cliff deaths) while introducing a sophisticated social, genetic, and territorial ecosystem. The mechanics (Personalities, Genetics, Territorial Matrix, Guard Mode) add depth to both tamed and wild encounters, rewarding player investment with a living, breathing world.

  ## Mechanics
  ### Core: Personality & DNA
  - **Types:** Aggressive (Scouts), Pacifist (Silent Alarms/Sentinels), Normal (Balanced).
  - **Individual DNA:** Every dog has a unique "preference roll" (UUID-based) determining participation in social events and rolled stats.
  - **Breeding & Inbreeding:** Advanced breeding passes down stats (Max Health, Attack Damage, Speed) via genetic inheritance with minor triangular mutation rolls. Kinship NBT tracks parents (`parent1Uuid`, `parent2Uuid`) to prevent inbreeding; breeding siblings/parent-child results in runts (penalized stats, slow, weak, tiny size). Inbred dogs can be outcrossed with healthy unrelated dogs or cured using a Golden Apple.
  - **Litter System:** Wolves can now produce multiple puppies (Litters) in a single breed, each with independent traits.
  - **Dynamic Size Scaling:** Wolves scale dynamically in size based on their rolled max health bonus: `scale = 1.0 + (healthBonus * 0.012)`. Ranging from 0.808x (worst-case Aggressive runt) to 1.312x (best-case Pacifist).

  ### Wild Pack Dynamics (Dasik Social AI)
  - **Pack Structure:** Wild wolves form persistent packs (up to 8) anchored to a leader.
  - **Dynamic Follower Spread Scaling:** Wild and tamed packs dynamically space themselves out wider as the pack size $N$ increases, calculated using the square root formula: $f(N) = \text{multiplier} \times \sqrt{N - 1}$.
  - **Stable Physics:** O(N) boids-inspired pack movement for high performance, optimized using cooperative follower caches to prevent per-tick scans.

  ### Guard Mode (Domestic)
  - **Activation:** Shift+Right-Click with a bone anchors the wolf to its current position, enabling personality-based patrol patterns.
  - **Patrol Patterns:** Aggressive performs outer perimeter sweeps; Normal paces radial stars or sits as a sentinel post; Pacifist circles orbital loops.
  - **Targeting Limits:** Guards strictly require line-of-sight to target hostiles, preventing through-wall cave aggro. Pacifists use a hybrid alarm model (hearing through solid walls up to 4 blocks vertically, or sight up to 16 blocks).
  - **Ambient Particles:** Custom-colored dust particles emit strictly during Guard Mode (Aggressive = Red, Normal = Gold, Pacifist = Green/Teal).

  ### Social AI & Quality of Life
  - **Paper Adoption:** Shift+Right-Clicking a tamed wolf with Paper puts it into a pending adoption state with rose-pink trail particles, allowing another player to claim ownership.
  - **Calm Down:** Shift+Right-Clicking with an empty hand makes the wolf sit, clearing its attack target and anger state.
  - **Low Health Fleeing:** Wolves flee when HP falls below 30% (Pacifist 100% chance, Normal 50%, Aggressive 10%).
  - **Storm Anxiety:** Reactive fear behavior gated by personality (Aggressive is immune; Pacifist has 3x higher risk).

  ### Config Mastery (Native Game Rules)
  - **Registry Integration:** 50+ AI parameters exposed via native Game Rules.
  - **Thematic Categorization:** Reorganized settings into 6 distinct categories for better UX (General, War, Litter, Health, Social, Spawning).
  - **Cloth Config & ModMenu:** Lazily-loaded Client-side GUI screens for configuration, preventing classloading crashes on dedicated servers.

  ## Technical Requirements
  - **Core**: Minecraft 26.2+, Java 25.
  - **Library**: DasikLibrary 1.7.4+.
  - **Mappings**: Official Mojang (Post-Obfuscation Era).
